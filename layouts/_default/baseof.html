<!DOCTYPE html>
<html lang="{{ site.Language }}" dir="{{ .Language.Direction | default "auto" }}">

<head>
  {{- partial "head.html" . }}
</head>

<body id="top" class="{{ if (or (ne .Kind "page") (eq .Layout "archives") (eq .Layout "search")) }}list{{ end }}">
  {{- partialCached "header.html" . .Page }}
  <main class="main container">
    {{- block "main" . }}{{ end }}
  </main>
  {{- partialCached "footer.html" . .Layout .Kind (.Param "hideFooter") }}
</body>

</html>
