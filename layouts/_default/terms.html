{{- define "main" }}

<div class="terms-page">
  {{- if .Title }}
  <header class="page-header">
    <h1>{{ .Title }}</h1>
  </header>
  {{- end }}

  <ul class="terms-list">
    {{- range .Data.Terms.Alphabetical }}
    <li>
      <a href="{{ .Page.RelPermalink }}">
        {{ .Page.Title }}
        <span class="term-count">({{ .Count }})</span>
      </a>
    </li>
    {{- end }}
  </ul>
</div>

{{- end }}
