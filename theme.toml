licenselink = "https://github.com/gandhi-jay/OhGoshTheTheme/blob/main/LICENSE"
description = "A retro terminal-inspired Hugo theme with multiple color schemes"
homepage = "https://github.com/gandhi-jay/OhGoshTheTheme"
tags = ["terminal", "retro", "dark", "light", "blog", "minimalist", "accessible", "fast"]
